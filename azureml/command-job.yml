$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../src
inputs:
  training_data:
    type: uri_file
    path: ../data/bike-rentals/bike-data/daily-bike-share.csv
outputs:
  model_output:
    type: uri_folder
command: >-
  python train.py
  --dataset ${{inputs.training_data}}
  --output-dir ${{outputs.model_output}}
environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
  conda_file: environment.yml
compute: azureml:cpu-cluster
experiment_name: bike-rentals-regression
display_name: bike-rentals-train
